<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enviro365 Investments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5">
        <h1 class="mb-4">Enviro365 Investments</h1>

        <!-- Portfolio section -->
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">View Portfolio</h5>

                <div class="input-group mb-3" style="max-width: 400px;">
                    <span class="input-group-text">Investor ID</span>
                    <input type="number" id="investorIdInput" class="form-control" placeholder="e.g. 1">
                    <button id="loadPortfolioBtn" class="btn btn-primary">View Portfolio</button>
                </div>

                <div id="portfolioMessage" class="text-danger"></div>

                <div id="portfolioDisplay" class="d-none">
                    <h6>Investor</h6>
                    <ul class="list-unstyled">
                        <li><strong>Name:</strong> <span id="investorName"></span></li>
                        <li><strong>Email:</strong> <span id="investorEmail"></span></li>
                        <li><strong>Age:</strong> <span id="investorAge"></span></li>
                    </ul>

                    <h6 class="mt-3">Products</h6>
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Type</th>
                                <th>Balance</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Withdrawal form -->
            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title">Submit Withdrawal</h5>

                    <div class="row g-2 mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Product ID</label>
                            <input type="number" id="withdrawProductIdInput" class="form-control" placeholder="e.g. 1">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Amount (R)</label>
                            <input type="number" id="withdrawAmountInput" class="form-control" placeholder="e.g. 500" step="0.01">
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <button id="submitWithdrawalBtn" class="btn btn-success">Submit Withdrawal</button>
                        </div>
                    </div>

                    <div id="withdrawalMessage"></div>
                </div>
            </div>

            <!-- History + CSV card -->
            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title">Withdrawal History</h5>

                    <div class="input-group mb-3" style="max-width: 400px;">
                        <span class="input-group-text">Investor ID</span>
                        <input type="number" id="historyInvestorIdInput" class="form-control" placeholder="e.g. 1">
                        <button id="loadHistoryBtn" class="btn btn-primary">Load History</button>
                    </div>

                    <div id="historyMessage" class="text-danger mb-2"></div>

                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Date</th>
                                <th>Product Type</th>
                                <th>Amount</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody"></tbody>
                    </table>

                    <hr class="my-4">

                    <h6>Download CSV (filter by date)</h6>
                    <div class="row g-2">
                        <div class="col-md-4">
                            <label class="form-label">From</label>
                            <input type="date" id="csvFromInput" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">To</label>
                            <input type="date" id="csvToInput" class="form-control">
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <button id="downloadCsvBtn" class="btn btn-outline-primary">Download CSV</button>
                        </div>
                    </div>
                    <div id="csvMessage" class="text-danger mt-2"></div>
                </div>
            </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
